name: axiom-official/axiom-flow-debugger
version: 0.1.0
language: python
description: Debugs failed Axiom flow executions by reading the debug event stream.
author: Axiom Official
license: MIT
nodes:
    - name: FlowDebugReader
      description: Fetches the debug event stream for a flow execution and attaches it to the TestResult.
      input: TestResult
      output: TestResult
    - name: FlowTraceAnalyser
      description: Analyses the flow debug trace to identify graph topology errors, adapter mismatches, or node failures.
      input: TestResult
      output: AnalysisResult
      required_secrets:
        - ANTHROPIC_API_KEY
    - name: FlowFixApplier
      description: Routes fix instructions to the FlowDesigner to rebuild the problematic portion of the graph.
      input: AnalysisResult
      output: AgentProgress
imports:
    - package: axiom-official/axiom-agent-messages
      version: 0.1.0
      messages:
        - NodeSpec
        - PublishResult
        - CompileResult
        - AgentRequest
        - PackageSpec
        - FlowSpec
        - TestResult
        - AnalysisResult
        - AgentProgress
